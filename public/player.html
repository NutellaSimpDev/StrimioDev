<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Strimio Local Player</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.css" />
    <style>
      :root {
        color-scheme: dark;
        --bg: #09090b;
        --panel: #151518;
        --line: rgba(255, 255, 255, 0.12);
        --text: #f7f7f8;
        --muted: #a1a1aa;
        --accent: #e50914;
        --ok: #2dd4bf;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-width: 320px;
        margin: 0;
        background: #09090b;
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .shell {
        display: grid;
        grid-template-columns: minmax(320px, 420px) minmax(0, 1fr);
        min-height: 100vh;
      }

      .panel {
        padding: 22px;
        border-right: 1px solid var(--line);
        background: var(--panel);
      }

      .stage {
        display: grid;
        align-content: start;
        gap: 18px;
        padding: 22px;
      }

      h1,
      h2 {
        margin: 0;
        letter-spacing: 0;
      }

      h1 {
        font-size: 1.45rem;
      }

      h2 {
        font-size: 1rem;
      }

      label {
        display: grid;
        gap: 7px;
        margin-top: 16px;
        color: var(--muted);
        font-size: 0.78rem;
        font-weight: 800;
      }

      input,
      select,
      button {
        min-height: 42px;
        border-radius: 8px;
        font: inherit;
      }

      input,
      select {
        width: 100%;
        padding: 0 12px;
        color: var(--text);
        background: rgba(255, 255, 255, 0.07);
        border: 1px solid var(--line);
        outline: 0;
      }

      button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0 14px;
        color: white;
        font-weight: 900;
        background: var(--accent);
        border: 0;
        cursor: pointer;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .resolve {
        width: 100%;
        margin-top: 16px;
      }

      .options {
        display: grid;
        gap: 10px;
        margin-top: 20px;
      }

      .option {
        display: grid;
        gap: 7px;
        padding: 12px;
        color: var(--text);
        text-align: left;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid var(--line);
        border-radius: 8px;
      }

      .option.active {
        border-color: var(--ok);
        box-shadow: inset 3px 0 0 var(--ok);
      }

      .option strong {
        font-size: 0.92rem;
      }

      .option span,
      .status {
        color: var(--muted);
        font-size: 0.78rem;
        line-height: 1.45;
      }

      .player-wrap {
        position: relative;
        overflow: hidden;
        background: black;
        border: 1px solid var(--line);
        border-radius: 8px;
      }

      video {
        width: 100%;
        aspect-ratio: 16 / 9;
        background: #000;
      }

      /* Custom Buffering Overlay Styles */
      #loadingOverlay {
        transition: opacity 0.35s cubic-bezier(0.25, 1, 0.5, 1);
      }
      #loadingOverlay.visible {
        opacity: 1;
        pointer-events: auto;
      }
      #loadingOverlayCard {
        transform: scale(0.92);
        transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      #loadingOverlay.visible #loadingOverlayCard {
        transform: scale(1);
      }

      /* Premium Plyr Custom Styles */
      .plyr--video {
        border-radius: 8px;
        overflow: hidden;
        aspect-ratio: 16 / 9 !important;
        width: 100% !important;
        height: auto !important;
      }
      .plyr__video-wrapper {
        aspect-ratio: 16 / 9 !important;
        width: 100% !important;
        height: 100% !important;
        background: #000 !important;
      }
      .plyr--video video {
        aspect-ratio: 16 / 9 !important;
        object-fit: contain !important;
        width: 100% !important;
        height: 100% !important;
      }
      .plyr__menu__container {
        background: rgba(15, 15, 18, 0.88) !important;
        backdrop-filter: blur(16px) !important;
        border: 1px solid rgba(255, 255, 255, 0.08) !important;
        border-radius: 12px !important;
        box-shadow: 0 12px 36px rgba(0, 0, 0, 0.6) !important;
        padding: 6px !important;
      }
      .plyr__menu__container [role="menu"] {
        max-height: 260px !important;
        overflow-y: auto !important;
      }
      .plyr__menu__container [role="menu"]::-webkit-scrollbar {
        width: 4px;
      }
      .plyr__menu__container [role="menu"]::-webkit-scrollbar-track {
        background: transparent;
      }
      .plyr__menu__container [role="menu"]::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.16);
        border-radius: 2px;
      }
      .plyr__menu__container [role="menu"]::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.3);
      }
      .plyr__control {
        font-family: inherit !important;
        font-size: 13px !important;
        font-weight: 600 !important;
        border-radius: 6px !important;
        transition: background 0.2s ease, color 0.2s ease !important;
      }
      .plyr__control:hover {
        background: rgba(255, 255, 255, 0.08) !important;
        color: #fff !important;
      }
      .plyr__control[aria-checked="true"] {
        color: #e50914 !important;
        background: rgba(229, 9, 20, 0.12) !important;
      }
      .plyr__control[aria-checked="true"]::after {
        background: #e50914 !important;
      }
      .plyr__menu__value {
        color: #a1a1aa !important;
        font-weight: 500 !important;
      }
      .plyr__control--back {
        font-weight: 700 !important;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08) !important;
        margin-bottom: 4px !important;
        border-radius: 0 !important;
      }

      /* Premium Glassmorphism Captions */
      .plyr__captions {
        padding: 16px !important;
      }
      .plyr__caption {
        background: rgba(9, 9, 11, 0.82) !important;
        backdrop-filter: blur(8px) !important;
        border: 1px solid rgba(255, 255, 255, 0.08) !important;
        border-radius: 8px !important;
        padding: 6px 14px !important;
        font-size: clamp(14px, 2vw, 20px) !important;
        font-weight: 500 !important;
        line-height: 1.5 !important;
        letter-spacing: -0.010em !important;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4) !important;
      }

      /* Option Stagger Animation */
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .option {
        opacity: 0;
        animation: fadeInUp 0.35s cubic-bezier(0.25, 1, 0.5, 1) forwards;
      }

      /* Pulsing Status dot styles */
      .status-container {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 16px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid var(--line);
        border-radius: 8px;
        font-size: 0.8rem;
        color: var(--muted);
        font-weight: 500;
      }

      .status-dot {
        position: relative;
        display: inline-block;
        width: 8px;
        height: 8px;
        background-color: var(--accent);
        border-radius: 50%;
      }

      .status-dot::after {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: 50%;
        background-color: var(--accent);
        animation: status-pulse 1.5s infinite ease-in-out;
      }

      @keyframes status-pulse {
        0% {
          transform: scale(1);
          opacity: 0.8;
        }
        100% {
          transform: scale(2.5);
          opacity: 0;
        }
      }

      @media (max-width: 900px) {
        .shell {
          grid-template-columns: 1fr;
        }

        .panel {
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="panel">
        <h1>Strimio Local Player</h1>
        <label>
          IMDb ID
          <input id="imdbId" value="tt0063350" />
        </label>
        <div class="row">
          <label>
            Tipo
            <select id="type">
              <option value="movie">movie</option>
              <option value="series">series</option>
            </select>
          </label>
          <label>
            Idiomas subs
            <input id="langs" value="lat,spa,eng" />
          </label>
        </div>
        <button class="resolve" id="resolveButton" type="button">Resolver fuentes</button>
        <div class="options" id="options"></div>
      </section>

      <section class="stage">
        <div class="player-wrap">
          <video id="player" controls crossorigin playsinline></video>
          <!-- Buffering/Loading Overlay -->
          <div id="loadingOverlay" class="pointer-events-none absolute inset-0 flex items-center justify-center bg-zinc-950/80 px-6 text-center backdrop-blur-md opacity-0 z-20">
            <div class="w-full max-w-md bg-zinc-900/60 border border-white/5 rounded-2xl p-6 shadow-2xl backdrop-blur-lg" id="loadingOverlayCard">
              <div class="relative mx-auto h-16 w-16 mb-4">
                <div class="absolute inset-0 rounded-full border-4 border-white/5"></div>
                <div class="absolute inset-0 rounded-full border-4 border-t-red-600 animate-spin shadow-[0_0_12px_rgba(229,9,20,0.5)]"></div>
              </div>
              <div>
                <h4 id="loadingTitle" class="text-lg font-black text-white tracking-wide">Conectando a los peers...</h4>
                <p id="loadingDetail" class="mt-2 text-sm text-zinc-400 font-medium">Preparando buffer inicial.</p>
              </div>
              <div class="mt-5">
                <div class="h-1.5 overflow-hidden rounded-full bg-white/10">
                  <div id="loadingProgress" class="h-full w-0 rounded-full bg-red-600 shadow-[0_0_8px_rgba(229,9,20,0.6)] transition-all duration-500 ease-out"></div>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div style="display: none;">
          <label style="margin-top: 0;">
            Pista de audio (remux/transcode)
            <select id="audioSelect" disabled>
              <option value="0">Audio original</option>
            </select>
          </label>
        </div>
        <div class="status-container">
          <span class="status-dot"></span>
          <span id="status">Listo para resolver fuentes locales.</span>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.polyfilled.js"></script>
    <script>
      const params = new URLSearchParams(window.location.search);
      const initialId = params.get('id');
      const initialTitle = params.get('title');
      const shouldAutoResolve = params.get('autoplayResolve') === 'true';
      let player = null;
      Object.defineProperty(window, 'playerElement', {
        get() {
          return player?.media || document.getElementById('player');
        },
        configurable: true
      });

      let customDuration = 0;
      let currentStartTime = 0;

      const originalDurationDescriptor = Object.getOwnPropertyDescriptor(HTMLMediaElement.prototype, 'duration');
      Object.defineProperty(HTMLMediaElement.prototype, 'duration', {
        get() {
          if (customDuration > 0 && (this === playerElement || this.id === 'player')) {
            return customDuration;
          }
          return originalDurationDescriptor.get.call(this);
        },
        configurable: true
      });

      const originalCurrentTimeDescriptor = Object.getOwnPropertyDescriptor(HTMLMediaElement.prototype, 'currentTime');
      Object.defineProperty(HTMLMediaElement.prototype, 'currentTime', {
        get() {
          if (currentStartTime > 0 && (this === playerElement || this.id === 'player')) {
            return currentStartTime + originalCurrentTimeDescriptor.get.call(this);
          }
          return originalCurrentTimeDescriptor.get.call(this);
        },
        set(val) {
          const isTranscoded = currentOption?.infoHash;
          if (isTranscoded && currentStartTime > 0 && val === 0) {
            originalCurrentTimeDescriptor.set.call(this, 0);
            return;
          }
          if (isTranscoded) {
            const currentDisplayTime = currentStartTime + originalCurrentTimeDescriptor.get.call(this);
            if (Math.abs(val - currentDisplayTime) > 1.5) {
              currentStartTime = val;
              reloadStreamAtTime(val);
              originalCurrentTimeDescriptor.set.call(this, 0);
              return;
            }
          }
          originalCurrentTimeDescriptor.set.call(this, val);
        },
        configurable: true
      });

      function setOverrideDuration(duration) {
        customDuration = duration;
        const video = playerElement;
        if (video) video.dispatchEvent(new Event('durationchange'));
      }

      function reloadStreamAtTime(time) {
        if (!currentOption) return;
        
        if (trackSwapTimeRestorationListener) {
          playerElement.removeEventListener('loadedmetadata', trackSwapTimeRestorationListener);
          trackSwapTimeRestorationListener = null;
        }
        
        showLoadingOverlay('Buscando...', `Saltando al segundo ${Math.round(time)}...`, false);
        
        const params = new URLSearchParams({
          fileIdx: String(currentFileIdx),
          audioIdx: String(selectedAudioTrack)
        });
        if (time > 0) {
          params.set('startTime', String(time));
        }

        player.source = {
          type: 'video',
          title: currentOption.title,
          sources: [
            {
              src: `/api/stream/${currentOption.infoHash}?${params}`,
              type: 'video/mp4',
              size: Number.parseInt(currentOption.quality, 10) || 1080
            }
          ]
        };

        setTimeout(() => {
          setupPlyrAudioMenu(player, cachedAudioTracks, selectedAudioTrack, (trackIdx) => {
            selectedAudioTrack = trackIdx;
            audioSelect.value = String(trackIdx);
            const btn = document.querySelector('.option.active');
            if (btn) {
              playOption(currentOption, btn, { keepTrackControls: true });
            }
          });
        }, 200);

        player.play().catch(() => {});
      }
      


      player = new Plyr(playerElement, {
        captions: { active: true, language: 'es', update: true },
        controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'captions', 'settings', 'fullscreen']
      });
      const optionsEl = document.getElementById('options');
      const statusEl = document.getElementById('status');

      function setStatus(message) {
        statusEl.textContent = message;
      }

      const loadingOverlay = document.getElementById('loadingOverlay');
      const loadingTitle = document.getElementById('loadingTitle');
      const loadingDetail = document.getElementById('loadingDetail');
      const loadingProgress = document.getElementById('loadingProgress');

      let statsTimer = null;
      let lastTorrentProgress = 0;
      let lastObservedTime = 0;

      function showLoadingOverlay(message = 'Conectando a los peers...', detail = 'Preparando buffer inicial.', resetProgress = false) {
        loadingTitle.textContent = message;
        loadingDetail.textContent = detail;
        if (resetProgress) {
          lastTorrentProgress = 0;
          loadingProgress.style.width = '0%';
        }
        loadingOverlay.classList.add('visible');
      }

      function hideLoadingOverlay() {
        loadingOverlay.classList.remove('visible');
        if (statsTimer) {
          clearInterval(statsTimer);
          statsTimer = null;
        }
      }

      function maybeHideOverlayForPlayback() {
        const video = playerElement;
        const advanced = video.currentTime > 0 && video.currentTime !== lastObservedTime;
        lastObservedTime = video.currentTime;
        if (video.readyState >= 3 || (!video.paused && (video.readyState >= HTMLMediaElement.HAVE_CURRENT_DATA || advanced))) {
          hideLoadingOverlay();
        }
      }

      async function pollTorrentStats(option) {
        if (statsTimer) clearInterval(statsTimer);

        const update = async () => {
          try {
            const params = new URLSearchParams({ fileIdx: String(option.fileIdx ?? 0) });
            const response = await fetch(`/api/stream/stats/${option.infoHash}?${params}`);
            const stats = await response.json();
            if (!response.ok) throw new Error(stats.error || 'No se pudieron leer estadisticas.');

            lastTorrentProgress = Math.max(lastTorrentProgress, Math.min(100, stats.progress || 0));
            loadingProgress.style.width = `${lastTorrentProgress}%`;
            if (!stats.numPeers) {
              loadingTitle.textContent = 'Conectando a los peers...';
              loadingDetail.textContent = `Buffering: ${stats.progress}% - ${stats.downloadSpeed} - sin peers conectados`;
              return;
            }

            loadingTitle.textContent = 'Buffering inicial...';
            loadingDetail.textContent = `Buffering: ${stats.progress}% - Descargando a ${stats.downloadSpeed} - ${stats.numPeers} peers conectados - ETA ${stats.timeRemaining}`;
          } catch (error) {
            loadingTitle.textContent = 'Esperando datos del torrent...';
            loadingDetail.textContent = error.message;
          }
        };

        await update();
        statsTimer = setInterval(update, 1000);
      }

      player.on('canplay', () => {
        if (loadingOverlay.classList.contains('visible')) {
          loadingTitle.textContent = 'Buffer listo';
          loadingDetail.textContent = 'Esperando reproducción estable...';
        }
        maybeHideOverlayForPlayback();
      });
      player.on('loadeddata', maybeHideOverlayForPlayback);
      player.on('progress', maybeHideOverlayForPlayback);
      player.on('playing', () => {
        hideLoadingOverlay();
      });
      player.on('timeupdate', maybeHideOverlayForPlayback);
      player.on('waiting', () => {
        if (currentOption?.infoHash) {
          showLoadingOverlay('Buffering...', 'El navegador está esperando más datos del torrent.', false);
          if (!statsTimer) pollTorrentStats(currentOption);
        }
      });
      player.on('stalled', () => {
        if (currentOption?.infoHash) {
          showLoadingOverlay('Conexión pausada...', 'Reintentando descarga desde peers activos.', false);
          if (!statsTimer) pollTorrentStats(currentOption);
        }
      });
      player.on('ready', () => {
        if (cachedAudioTracks && cachedAudioTracks.length > 1) {
          setupPlyrAudioMenu(player, cachedAudioTracks, selectedAudioTrack, (trackIdx) => {
            selectedAudioTrack = trackIdx;
            audioSelect.value = String(trackIdx);
            const btn = document.querySelector('.option.active');
            if (btn) {
              playOption(currentOption, btn, { keepTrackControls: true });
            }
          });
        }
      });

      function clearTracks() {
        [...playerElement.querySelectorAll('track')].forEach((track) => track.remove());
      }

      async function attachSubtitles(option) {
        clearTracks();
        const imdbId = document.getElementById('imdbId').value.trim();
        const langs = document.getElementById('langs').value.trim();
        const params = new URLSearchParams({
          id: imdbId,
          langs,
          infoHash: option.infoHash,
          fileIdx: String(option.fileIdx ?? 0),
          filename: option.title
        });
        const response = await fetch(`/api/subtitles/batch?${params}`);
        const data = await response.json();

        for (const subtitle of data.subtitles || []) {
          const track = document.createElement('track');
          track.kind = 'subtitles';
          track.label = `${subtitle.label} (${subtitle.provider})`;
          track.srclang = subtitle.lang;
          track.src = subtitle.url;
          if (!playerElement.querySelector('track')) track.default = true;
          playerElement.appendChild(track);
        }

        if (data.subtitles?.length) {
          setStatus(`Subtitulos cargados: ${data.subtitles.map((item) => item.label).join(', ')}`);
        } else if (data.errors?.length) {
          setStatus(`Sin subtitulos automaticos. ${data.errors[0]}`);
        }
      }

      let currentOption = null;
      let currentFileIdx = 0;
      let selectedAudioTrack = 0;
      let cachedAudioTracks = [];
      let trackSwapTimeRestorationListener = null;
      const audioSelect = document.getElementById('audioSelect');

      function preferredAudioIndex(audioTracks) {
        const preferred = audioTracks.find((track) => {
          const text = `${track.label || ''} ${track.language || ''} ${track.title || ''}`.toLowerCase();
          return /\b(lat|la|latin|latino|spa|es|esp|spanish|español|castellano)\b/i.test(text);
        });
        return preferred?.index ?? audioTracks[0]?.index ?? 0;
      }

      async function loadAudioTracks(option, fileIdx, attempts = 3) {
        audioSelect.innerHTML = '<option>Detectando pistas de audio...</option>';
        audioSelect.disabled = true;
        
        try {
          const params = new URLSearchParams({ fileIdx: String(fileIdx) });
          const response = await fetch(`/api/stream/tracks/${option.infoHash}?${params}`);
          if (!response.ok) throw new Error('No se pudieron leer pistas');
          const data = await response.json();
          
          if ((!data.audio || data.audio.length === 0) && attempts > 1) {
            if (currentOption !== option) return;
            await new Promise(resolve => setTimeout(resolve, 4000));
            return loadAudioTracks(option, fileIdx, attempts - 1);
          }
          
          const audio = data.audio || [];
          cachedAudioTracks = audio;
          
          const duration = data.duration || 0;
          
          if (!audio.length) {
            audioSelect.innerHTML = '<option value="0">Audio original</option>';
            audioSelect.disabled = true;
            return;
          }
          
          audioSelect.innerHTML = audio.map((track) => {
            const suffix = [track.language, track.codec].filter(Boolean).join(' · ');
            const label = suffix ? `${track.label} · ${suffix}` : track.label;
            return `<option value="${track.index}">${label}</option>`;
          }).join('');
          audioSelect.value = String(selectedAudioTrack);
          audioSelect.disabled = audio.length < 2;

          setTimeout(() => {
            setupPlyrAudioMenu(player, audio, selectedAudioTrack, (trackIdx) => {
              selectedAudioTrack = trackIdx;
              audioSelect.value = String(trackIdx);
              const btn = document.querySelector('.option.active');
              if (btn) {
                playOption(option, btn, { keepTrackControls: true });
              }
            });
          }, 200);
        } catch (error) {
          if (attempts > 1) {
            if (currentOption !== option) return;
            await new Promise(resolve => setTimeout(resolve, 4000));
            return loadAudioTracks(option, fileIdx, attempts - 1);
          }
          audioSelect.innerHTML = '<option value="0">Audio original</option>';
          audioSelect.disabled = true;
        }
      }

      async function playOption(option, button, settings = {}) {
        document.querySelectorAll('.option').forEach((node) => node.classList.remove('active'));
        button.classList.add('active');

        if (!option.infoHash) {
          setStatus('Esta opcion no trae infoHash reproducible.');
          return;
        }

        currentOption = option;
        currentFileIdx = option.fileIdx ?? 0;
        
        if (!settings.keepTrackControls) {
          showLoadingOverlay('Conectando a los peers...', 'Iniciando reproducción...', true);
          pollTorrentStats(option);
        } else {
          showLoadingOverlay('Cargando pista de audio...', 'Preparando stream con nuevo idioma.', false);
          pollTorrentStats(option);
        }

        const prevDuration = customDuration;
        if (!settings.keepTrackControls) {
          selectedAudioTrack = 0;
          currentStartTime = 0;
          let fallbackDuration = 1320;
          const typeSelect = document.getElementById('type');
          if (typeSelect && typeSelect.value === 'movie') {
            fallbackDuration = 6000;
          }
          setOverrideDuration(fallbackDuration);
        } else {
          setOverrideDuration(prevDuration);
        }

        const currentTime = playerElement.currentTime || 0;
        
        const params = new URLSearchParams({
          fileIdx: String(currentFileIdx),
          audioIdx: String(selectedAudioTrack)
        });

        // Load stream immediately
        player.source = {
          type: 'video',
          title: option.title,
          sources: [
            {
              src: `/api/stream/${option.infoHash}?${params}`,
              type: 'video/mp4',
              size: Number.parseInt(option.quality, 10) || 1080
            }
          ]
        };

        if (trackSwapTimeRestorationListener) {
          playerElement.removeEventListener('loadedmetadata', trackSwapTimeRestorationListener);
        }

        if (settings.keepTrackControls && currentTime > 0) {
          trackSwapTimeRestorationListener = () => {
            playerElement.currentTime = currentTime;
            player.play().catch(() => {});
            playerElement.removeEventListener('loadedmetadata', trackSwapTimeRestorationListener);
            trackSwapTimeRestorationListener = null;
          };
          playerElement.addEventListener('loadedmetadata', trackSwapTimeRestorationListener);
        }

        if (settings.keepTrackControls) {
          setTimeout(() => {
            setupPlyrAudioMenu(player, cachedAudioTracks, selectedAudioTrack, (trackIdx) => {
              selectedAudioTrack = trackIdx;
              audioSelect.value = String(trackIdx);
              const btn = document.querySelector('.option.active');
              if (btn) {
                playOption(option, btn, { keepTrackControls: true });
              }
            });
          }, 200);
        }

        setStatus(`Cargando stream ${option.quality}. Audio convert/remuxIdx: ${selectedAudioTrack}.`);

        // Load metadata and subtitles in parallel in the background (fresh play only)
        if (!settings.keepTrackControls) {
          attachSubtitles(option).then(() => {
            if (currentOption !== option) return;
            return loadAudioTracks(option, currentFileIdx);
          }).then(() => {
            if (currentOption !== option) return;
            const preferredIdx = preferredAudioIndex(cachedAudioTracks);
            if (preferredIdx !== 0) {
              selectedAudioTrack = preferredIdx;
              audioSelect.value = String(preferredIdx);
              const btn = document.querySelector('.option.active');
              if (btn) {
                playOption(option, btn, { keepTrackControls: true });
              }
            }
          }).catch(err => {
            console.error('Error al inicializar metadatos en segundo plano:', err);
          });
        }
        
        player.play().catch(() => setStatus('El navegador bloqueo autoplay; pulsa play en el reproductor.'));
      }

      audioSelect.addEventListener('change', () => {
        if (!currentOption) return;
        selectedAudioTrack = Number(audioSelect.value);
        const btn = document.querySelector('.option.active');
        if (btn) {
          playOption(currentOption, btn, { keepTrackControls: true });
        }
      });

      async function resolveSources() {
        const imdbId = document.getElementById('imdbId').value.trim();
        const type = document.getElementById('type').value;
        optionsEl.innerHTML = '';
        setStatus('Resolviendo Torrentio...');

        const params = new URLSearchParams({
          id: imdbId,
          type,
          allowUnverified: 'true'
        });
        const response = await fetch(`/api/resolve?${params}`);
        const data = await response.json();

        if (!response.ok) {
          setStatus(data.error || 'No se pudo resolver.');
          return;
        }

        const options = (data.options || []).filter((option) => option.infoHash).slice(0, 5);
        setStatus(`Opciones listas: ${options.length}. Prioridad visual: español latino, español, inglés.`);

        options.forEach((option, index) => {
          const button = document.createElement('button');
          button.className = 'option';
          button.style.animationDelay = `${index * 0.05}s`;
          button.type = 'button';
          button.innerHTML = `
            <strong>${option.quality} · ${option.server}</strong>
            <span>${option.title}</span>
            <span>${option.infoHash} · fileIdx ${option.fileIdx ?? 0}</span>
          `;
          button.addEventListener('click', () => playOption(option, button));
          optionsEl.appendChild(button);
        });
      }

      document.getElementById('resolveButton').addEventListener('click', resolveSources);

      if (initialId) {
        document.getElementById('imdbId').value = initialId;
        if (initialTitle) document.title = `Strimio · ${initialTitle}`;
        if (shouldAutoResolve) resolveSources();
      }

      function setupPlyrAudioMenu(playerInstance, audioTracks, currentSelectedIdx, onTrackChange) {
        const container = playerInstance.elements.container;
        if (!container) return;

        const tryInject = () => {
          const homeMenu = container.querySelector('.plyr__menu__container__inner [id$="-home"] [role="menu"]');
          const innerContainer = container.querySelector('.plyr__menu__container__inner');
          if (!homeMenu || !innerContainer) return false;

          const existingBtn = homeMenu.querySelector('[target-panel="audio"]');
          if (existingBtn) existingBtn.remove();
          const existingPanel = innerContainer.querySelector('#plyr-settings-audio-panel');
          if (existingPanel) existingPanel.remove();

          if (!audioTracks || audioTracks.length < 2) {
            return true;
          }

          const audioBtn = document.createElement('button');
          audioBtn.type = 'button';
          audioBtn.className = 'plyr__control plyr__control--forward';
          audioBtn.setAttribute('role', 'menuitem');
          audioBtn.setAttribute('aria-haspopup', 'true');
          audioBtn.setAttribute('target-panel', 'audio');
          
          const currentTrack = audioTracks.find(t => t.index === currentSelectedIdx) || audioTracks[0];
          const currentLabel = currentTrack ? (currentTrack.language || currentTrack.label || 'Original') : 'Original';
          
          audioBtn.innerHTML = `
            <span>Audio</span>
            <span class="plyr__menu__value" id="plyr-audio-value">${currentLabel}</span>
          `;
          homeMenu.appendChild(audioBtn);

          const audioPanel = document.createElement('div');
          audioPanel.id = 'plyr-settings-audio-panel';
          const speedPanel = innerContainer.querySelector('[id$="-speed"]');
          audioPanel.className = speedPanel ? speedPanel.className : 'plyr__menu__panel';
          audioPanel.setAttribute('hidden', '');

          const backBtn = document.createElement('button');
          backBtn.type = 'button';
          backBtn.className = 'plyr__control plyr__control--back';
          backBtn.setAttribute('target-panel', 'home');
          
          const nativeBackBtn = speedPanel ? speedPanel.querySelector('.plyr__control--back') : null;
          if (nativeBackBtn) {
            backBtn.innerHTML = nativeBackBtn.innerHTML;
          } else {
            backBtn.innerHTML = '<span aria-hidden="true">Audio</span>';
          }
          audioPanel.appendChild(backBtn);

          const menuList = document.createElement('div');
          menuList.setAttribute('role', 'menu');
          
          audioTracks.forEach((track) => {
            const trackBtn = document.createElement('button');
            trackBtn.type = 'button';
            trackBtn.setAttribute('role', 'menuitemradio');
            trackBtn.className = 'plyr__control';
            trackBtn.setAttribute('aria-checked', track.index === currentSelectedIdx ? 'true' : 'false');
            trackBtn.value = String(track.index);
            
            const suffix = [track.language, track.codec].filter(Boolean).join(' · ');
            const label = suffix ? `${track.label} · ${suffix}` : track.label;
            trackBtn.innerHTML = `
              <span>${label}</span>
            `;
            
            trackBtn.addEventListener('click', () => {
              menuList.querySelectorAll('[role="menuitemradio"]').forEach(btn => {
                btn.setAttribute('aria-checked', 'false');
              });
              trackBtn.setAttribute('aria-checked', 'true');
              
              const valSpan = audioBtn.querySelector('#plyr-audio-value');
              if (valSpan) valSpan.textContent = track.language || track.label || 'Original';
              
              audioPanel.setAttribute('hidden', '');
              const homePanel = innerContainer.querySelector('[id$="-home"]');
              if (homePanel) homePanel.removeAttribute('hidden');
              
              onTrackChange(track.index);
            });
            
            menuList.appendChild(trackBtn);
          });
          
          audioPanel.appendChild(menuList);
          innerContainer.appendChild(audioPanel);

          audioBtn.addEventListener('click', () => {
            const homePanel = innerContainer.querySelector('[id$="-home"]');
            if (homePanel) homePanel.setAttribute('hidden', '');
            audioPanel.removeAttribute('hidden');
          });

          backBtn.addEventListener('click', () => {
            audioPanel.setAttribute('hidden', '');
            const homePanel = innerContainer.querySelector('[id$="-home"]');
            if (homePanel) homePanel.removeAttribute('hidden');
          });

          const settingsToggle = container.querySelector('[data-plyr="settings"]');
          if (settingsToggle) {
            const observer = new MutationObserver(() => {
              const isExpanded = settingsToggle.getAttribute('aria-expanded') === 'true';
              if (!isExpanded) {
                audioPanel.setAttribute('hidden', '');
                const homePanel = innerContainer.querySelector('[id$="-home"]');
                if (homePanel) homePanel.removeAttribute('hidden');
              }
            });
            observer.observe(settingsToggle, { attributes: true, attributeFilter: ['aria-expanded'] });
            
            if (audioPanel._observer) {
              audioPanel._observer.disconnect();
            }
            audioPanel._observer = observer;
          }

          return true;
        };

        if (!tryInject()) {
          let attempts = 0;
          const interval = setInterval(() => {
            attempts += 1;
            if (tryInject() || attempts > 12) {
              clearInterval(interval);
            }
          }, 50);
        }
      }
    </script>
  </body>
</html>
